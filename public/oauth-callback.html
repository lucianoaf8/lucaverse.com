<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://lucaverse-auth.lucianoaf8.workers.dev; object-src 'none'; base-uri 'self'; frame-ancestors 'self';">
    <title>Authentication Complete</title>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #040810;
            color: #00E5FF;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .message {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 229, 255, 0.3);
            border-top: 3px solid #00E5FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <p>Authentication successful! Closing window...</p>
    </div>
    
    <script>
        // SECURITY: Read auth API URL from query param (set by auth worker redirect)
        // Validate against allowlist to prevent open-redirect attacks
        const ALLOWED_APIS = [
            'https://lucaverse-auth.lucianoaf8.workers.dev',
            'http://localhost:8787'
        ];
        const urlParams = new URLSearchParams(window.location.search);
        const apiParam = urlParams.get('api');
        const AUTH_API = (apiParam && ALLOWED_APIS.includes(apiParam))
            ? apiParam
            : 'https://lucaverse-auth.lucianoaf8.workers.dev';
        const exchangeCode = urlParams.get('code');
        const error = urlParams.get('error');

        function closePopup() {
            setTimeout(() => {
                try { window.close(); } catch (e) {
                    console.debug('Popup self-close blocked by COOP policy');
                }
            }, 2000);
        }

        function sendToParent(msg) {
            // Primary: BroadcastChannel (works even when window.opener is severed by COOP)
            try {
                const bc = new BroadcastChannel('lucaverse_oauth');
                bc.postMessage(msg);
                bc.close();
            } catch (e) {
                console.debug('BroadcastChannel unavailable:', e);
            }
            // Fallback: postMessage (may fail if COOP severed window.opener)
            if (window.opener) {
                try {
                    window.opener.postMessage(msg, window.location.origin);
                } catch (e) {
                    console.debug('postMessage fallback failed:', e);
                }
            }
        }

        if (error) {
            sendToParent({ type: 'OAUTH_ERROR', error: error });
            closePopup();

        } else if (exchangeCode) {
            // SECURITY: Exchange short-lived code for actual credentials via secure POST
            fetch(AUTH_API + '/auth/exchange?code=' + encodeURIComponent(exchangeCode), {
                credentials: 'include'
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.sessionId && data.token) {
                    sendToParent({
                        type: 'OAUTH_SUCCESS',
                        token: data.token,
                        sessionId: data.sessionId
                    });
                } else {
                    sendToParent({ type: 'OAUTH_ERROR', error: data.error || 'exchange_failed' });
                }
                closePopup();
            })
            .catch(function() {
                sendToParent({ type: 'OAUTH_ERROR', error: 'exchange_failed' });
                closePopup();
            });
        }
    </script>
</body>
</html>
